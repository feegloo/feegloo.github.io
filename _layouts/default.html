<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | strip_newlines | truncate: 160 }}">
  <meta name="theme-color" content="#f5efe8">

  <style>
    :root {
      --bg: #f8f3ee;
      --surface: rgba(255, 255, 255, 0.9);
      --text: #2b241f;
      --text-soft: #6f6258;
      --heading: #1f1a17;
      --line: rgba(88, 67, 53, 0.12);
      --primary: #8f5f3d;
      --shadow: 0 18px 50px rgba(55, 37, 24, 0.09);
      --radius: 20px;
      --content-width: 860px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", Times, serif;
      color: var(--text);
      background: linear-gradient(180deg, #fbf7f2 0%, var(--bg) 100%);
      line-height: 1.75;
      letter-spacing: 0.01em;
      padding: 32px 20px 56px;
    }

    a {
      color: var(--primary);
      text-decoration: none;
    }

    a:hover {
      opacity: 0.8;
    }

    .site-shell {
      max-width: 1100px;
      margin: 0 auto;
    }

    .site-header {
      margin-bottom: 28px;
      text-align: center;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      color: var(--heading);
    }

    .brand-mark img {
      width: 40px;
      height: 40px;
    }

    .content-card {
      max-width: var(--content-width);
      margin: 0 auto;
      background: var(--surface);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
    }

    .content-inner {
      padding: 44px 48px 52px;
    }

    main h1,
    main h2,
    main h3 {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--heading);
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin: 1.6em 0 0.6em;
    }

    main h1 {
      font-size: 2.4rem;
      margin-top: 0;
    }

    main h2 {
      font-size: 1.6rem;
    }

    main p,
    main li,
    main div {
      font-size: 1.08rem;
    }

    main ul {
      padding-left: 1.3rem;
    }

    main li + li {
      margin-top: 0.4em;
    }

    main img {
      max-width: 100%;
      display: block;
      margin: 1.5rem auto;
      border-radius: 14px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    .site-footer {
      max-width: var(--content-width);
      margin: 18px auto 0;
      text-align: center;
      color: var(--text-soft);
      font-size: 0.9rem;
    }

    @media (max-width: 720px) {
      .content-inner {
        padding: 28px 20px 34px;
      }

      main h1 {
        font-size: 2rem;
      }
    }
  </style>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-FT1KCDMZJQ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-FT1KCDMZJQ');
  </script>

  <script
    src="https://browser.sentry-cdn.com/8.26.0/bundle.tracing.replay.feedback.min.js"
    crossorigin="anonymous">
  </script>
  <script src="/lib/sentry-config.js"></script>
  <script>
    initSentry();
  </script>
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <a class="brand" href="/">
        <span class="brand-mark">
          <img src="/favicon.png" alt="logo">
        </span>
        <span>{{ site.title }}</span>
      </a>
    </header>

    <div class="content-card">
      <main class="content-inner">
        {{ content }}
      </main>
    </div>

    <footer class="site-footer">
      <p>Informacje mają charakter edukacyjny i nie zastępują konsultacji lekarskiej.</p>
    </footer>
  </div>
</body>
</html>
